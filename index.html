<!DOCTYPE html>
<html>
<head>
    <title>💖 Love Oracle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 340px;
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 5px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        button {
            width: 90%;
            padding: 12px;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #e63956;
        }

        #loading {
            display: none;
            margin-top: 15px;
            color: gray;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }

        .box {
            background: #fff0f3;
            padding: 15px;
            border-radius: 12px;
            animation: pop 0.4s ease;
        }

        @keyframes pop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

<body>

<!-- 🎵 Love music -->
<audio id="loveMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/10/30/audio_d7e5c6b6b1.mp3?filename=romantic-piano-ambient-121983.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <h2>💖 Love Oracle</h2>
    <p>Let fate decide your connection ✨</p>

    <input id="a" placeholder="Your name">
    <input id="b" placeholder="Crush's name">

    <button onclick="start()">Reveal Fate 💘</button>

    <div id="loading">💫 Consulting the stars...</div>
    <div id="result"></div>
</div>

<script>

function start() {
    let a = document.getElementById("a").value;
    let b = document.getElementById("b").value;

    if (!a || !b) return;

    // 🎵 play music
    let music = document.getElementById("loveMusic");
    music.volume = 0.4;
    music.play();

    document.getElementById("result").innerHTML = "";
    document.getElementById("loading").style.display = "block";

    setTimeout(() => {
        document.getElementById("loading").style.display = "none";

        let percent = Math.floor(Math.random() * 101);

        let messages = [
            "💔 The universe is not responding to this connection.",
            "😬 Emotional alignment: unstable.",
            "📉 Compatibility levels are below expectation.",
            "💀 The stars suggest moving on… gently.",
            "🚫 This match has been rejected by fate.",
            "😂 Villain_X475 says: interesting choice…"
        ];

        let msg = messages[Math.floor(Math.random() * messages.length)];

        document.getElementById("result").innerHTML = `
            <div class="box">
                ${a} ❤️ ${b}<br><br>
                Compatibility: ${percent}%<br><br>
                ${msg}<br><br>
                ⚠️ You have been analyzed by Villain_X475 😈
            </div>
        `;
    }, 2500);
}

</script>

</body>
</html>
