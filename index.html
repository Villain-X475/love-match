<!DOCTYPE html>
<html>
<head>
    <title>HeartLink 💖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app {
            width: 340px;
            height: 600px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            background: #ff4d6d;
            color: white;
            font-size: 18px;
        }

        .card {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .heart {
            font-size: 60px;
            margin-bottom: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px auto;
            border-radius: 12px;
            border: 1px solid #ddd;
            display: block;
        }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px;
            width: 90%;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            margin: 10px auto;
        }

        button:hover {
            background: #e63956;
        }

        #loading {
            display: none;
            font-size: 14px;
            margin-top: 10px;
            color: gray;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;
        }

        .footer {
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: gray;
            border-top: 1px solid #eee;
        }

        .matchBox {
            background: #fff0f3;
            padding: 10px;
            border-radius: 15px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="app">
    <div class="header">💖 HeartLink Dating</div>

    <div class="card">
        <div class="heart">💘</div>

        <input type="text" id="name1" placeholder="Your name">
        <input type="text" id="name2" placeholder="Their name">

        <button onclick="match()">Find Match</button>

        <div id="loading">Finding emotional compatibility...</div>

        <div id="result"></div>
    </div>

    <div class="footer">Made with 💕 by HeartLink AI</div>
</div>

<script>
function match() {
    let name1 = document.getElementById("name1").value;
    let name2 = document.getElementById("name2").value;

    if (!name1 || !name2) {
        document.getElementById("result").innerHTML = "Please enter both names 💔";
        return;
    }

    document.getElementById("result").innerHTML = "";
    document.getElementById("loading").style.display = "block";

    setTimeout(() => {
        document.getElementById("loading").style.display = "none";

        let percent = Math.floor(Math.random() * 101);

        let messages = [
            "You two are dangerously cute 😳",
            "Strong emotional chemistry 💞",
            "Friendzone potential detected 😭",
            "This might actually work 👀",
            "Soft love energy detected ✨",
            "Unexpected match 💘"
        ];

        let msg = messages[Math.floor(Math.random() * messages.length)];

        document.getElementById("result").innerHTML = `
            <div class="matchBox">
                ${name1} ❤️ ${name2}<br><br>
                Compatibility: ${percent}%<br><br>
                ${msg}
            </div>
        `;
    }, 2000);
}
</script>

</body>
</html>
